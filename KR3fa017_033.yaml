body:
  text: 用其推得或卯前或卯後分或酉前酉後分千只作千百只作百分去減日周一万分余有為推得時差分也定數如滿百分者為單分滿千分者為十分也推食甚定分法第五置推得加時差分全分內加入其定望小余全分共為食甚定分也定數將定望小余千只作千分百只作百分用之也推食甚入盈縮曆法第六置推得食甚定分內加其或元盈曆或元縮曆全分共得內又只加入定望大余却減去經望大小余全分余有為推得食甚入盈縮曆分也又視其元是盈曆者加之為食甚入盈曆也元是縮曆者亦加入為食甚入縮曆也定數万只是万而千只為千也推盈縮曆入初末限法第七視其推得食甚或入盈曆或入縮曆全分如在周天象限九十一度三一四三七五巳下者為初限也如在巳上者用以去減半歲周一百八十二度六二一二五余有為末限也是盈為盈而縮為縮也
  hash: sha256:c500b5495c3e49de996099a7c7e4db5ad73efa74ed637a0852def9bad4b5ea89
