body:
  text: 推五星各各合伏下盈縮曆分法第九置其中積全分內加入各星之曆應全分及元推得各後合全分共得如滿各星之曆率全分累去之余有用各星之度率全分為法以除之定數以十万除一万滿法者得一度以一万除一万滿法者亦得一度不滿法者皆得十分也除得數如不滿曆中一百八十二度六十二分八十七秒半就為盈縮曆分也以一万除百万法得百万不滿法得十万也以十万除千万滿法得百万不滿法得十万也凡推盈縮曆分者只用各年元推後合分之中積分推之並不論後合曾借上年也又如元推得後合分即是反減其周率只一次所余之數者滿雖歲周分亦不必去也推者至此與前第六篇後所載相尜較而用庻不致差推其盈縮曆也推五星各各合伏巳後逐位叚目下盈縮曆分法第十置其各各合伏下或是盈曆全分或是縮曆全分以其各星之叚目下逐位限度分而累加之共得即為逐叚之盈縮曆分也遇滿曆中一百八十二度六十二分八十七秒半去之是盈交扵
  hash: sha256:94c17f910c927dbb1821b34ed3190a4a4219e4313acb0b6f6e0508716177e803
