body:
  text: 推五星各各合伏下並逐位叚目下定積日分法第十二置各叚中積日全分以其本叚下盈縮差全分如是盈差者則加之如是縮差者則減之也如盈縮差多而其中積日分少不及減者加歲週三百六十五万二千四百二十五分減去之又於加其差遇滿歲周全分去之也如遇本叚下元無差者借其前叚差盈加縮減之而為本叚定積日分也雖是金水二星亦只用元推得差加減之並不用倍之及三之之數也推五星各各合伏下並逐位叚目下加時日分法第十三置其各叚定積日全分以其各年前冬至全分加之共得遇滿紀法六十万去之余有為加時日分也滿万為日依其万巳上數命甲子筭外得其日辰也若遇其定積日分魯加歲周全分者及推各年合伏魯用其上年中積分者則當用其上年天正冬至
  hash: sha256:fc8ccb18e300552dd91c5047fe215250a51c45e405220c55eb0596551b7a268a
