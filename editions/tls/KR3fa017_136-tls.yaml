body:
  text: 差數余有為定星度分也如其中星度分少如其縮差度分而不及減者加入歲週三百六十五万二千四百二十五分然後減之也又如遇無中星度之叚亦無定星度分與加時定星度分也金星用倍之差加減之水星用三之差加減之也於其定星度全分內就加入其各年前冬至黃道宿次全分共得為加時定星度分也遇滿歲周全分去之若中星度分魯加歲周分者及推合伏魯用上年中積分者皆當用其各上年冬至黃道宿次度分加之也如在定積日減歲周分巳後者則當交用其年黃道宿次度分加之也如在定積日未滿歲周全分已內者雖中星度魯加減歲周分者亦只用同年黃道宿次度分加之也每遇減歲周分一次者其黃道宿次度分亦交換一次而用之也其無中星度分叚下亦無定星度及加時定星度並夜半定星度分及宿次也又如在交正月前後者則用上年黃道宿次度分如在正月後遠得五六日者只用本
  hash: sha256:ff313447135cb52f3569dda3947c792fa1a93fd05a45ba0bae32457540fe1699
