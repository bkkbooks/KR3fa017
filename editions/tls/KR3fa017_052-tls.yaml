body:
  text: 度分為推得月離黃道宿次度分也推月食有帶食分秒法与日食帶食分秒法同用具在日食通軓中黃道各宿次鈐箕九度五九斗三十三度六牛三十九度九六女五十一度八虛六十度八七五危七十六度三七五室九十四度三五七五壁一百三度六九七五奎一百二十一度五六七五婁一百三十三度九二七五胃一百四十九度七三七五昴一百六十度八一七五畢一百七十七度三一七五嘴一百七十七度三六七五參一百八十七度六四七五井二百一十八度六七七五鬼二百二十度七八七五栁二百三十三度七八七五星二百四十度九七五張二百五十七度八八七五翼二百七十七度九七七五軫二百九十六度一五七五角三百九度五九七五亢三百一十九度一五七五氏三百三十五度五五七五房三百四十一度三七五心三百四十七度三七五尾三百六十五度二五七五月食通軓終
