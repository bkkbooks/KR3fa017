body:
  text: 是用其前合分去減周率全分只一次余有為之後合分也遇滿歲周三百六十五万二千四百二十五分者必須用其上年癸亥中積全分推其年之後合分及盈縮曆分方是如其後合分不遇滿歲周全分者只此便為其年之後合分也如是推當年及次年乙丑之盈縮曆分者其後合分遇歲周全分者卻當用次年之丙寅年中積全分推其盈縮曆分方是也如其後合分遇满歲周全分者只此便為其年之後合分及盈縮曆分也不依此推之者必是差也又凡推五星各各盈縮曆分必元推後合分年中積全分內推之方是學推者詳之又如後合份滿歲周全分者即次年之後合分也如是同年之次年後合分遇滿歲周分去之余有為後合分也亦無妨推五星各各合伏巳後逐位叚目下中積日分法第七置其各各合伏下中積日全分以其各星之叚目下逐位叚日分挨而累加之共得即為逐叚
