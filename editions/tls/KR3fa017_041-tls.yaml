body:
  text: 置其推得食甚定分全分內加入推得定用分全分共得復圓分也推時同前五限辰刻等法推旣內分法第十七置推得月食分秒自草分巳下全分用以去減一十五分余為實復用元減之自單分巳下全分為法乘之定數以衛為準元列分位前通第六位為十分也得數為積實立天元一扵單衛之下依平方法開之得為旣內開方數以四千九百二十為法乘旣內開方數定數以二十分為準元列分位前通第四位為万分也得數又為實以其定限行度為法而一得為旣內分也定數以度除万分滿法得百分不滿法為十分也若以十分除万分滿法得千分不滿法亦為百分也推旣外分法第十八置其推得定用分全分內減去其推得旣內分全分余有為推得旣外分也推初虧分法十九置其推得食甚定分全分內減去其推得定用
