body:
  text: 度率也又有如前後二叚皆是同名宿次者視其後多前少者為順如遇前多後少者為逆此當反減之而為度率也如不及減者亦加周天全分減之也如木星火星土星夕退金星夕退伏合推伏晨退水星合退伏皆置其本叚夜半定星度全分內減後叚夜半定星度全分余為各本叚之度率也如火星土星夕退金星夕退伏合退伏晨退晨留水星合退伏皆置其本叚夜半定星度全分內減其各後之留叚加時定星度全分余有為本叚度率也如不及減者加周天全分減之也如木星火星晨退夕遲初土星晨退夕遲金星夕退晨遲初水星夕退伏晨遲皆元無夜半定星度分及加時定星度分俱
