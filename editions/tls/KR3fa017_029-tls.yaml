body:
  text: 錄各有食之望下凡諸小余皆止乎衛惟交常度全妝經望全分盈縮曆全分盈縮差全分遲疾曆全分限數遲疾差全分加減差全分定望全分交沂全分定入遲疾曆全分各遲疾曆全分內以其加減差加減之得而定入遲疾曆分也定限定入遲疾曆分內加二二得為定限也定限行度視同定限下遲疾行度是遲用遲是疾用疾全分內減去日行分八分二十秒余為所得晨昏分視所得或盈曆初末或元縮曆初末大余若干日下晨分全錄之是也遇有帶食之分者亦用其日之日出分日入分也歲前冬至加時黃道宿次度分右元是盈曆者書盈元是縮曆者書縮其遲疾曆加減差亦然凡惟交食必依此而錄之
  hash: sha256:9e49e1c13eb11c086f0c864899d421a65e5ea289a816c1d921470fda93548702
