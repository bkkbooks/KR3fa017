body:
  text: 行宿次度分也皆滿黃道各宿本度全分去之余有為次宿之度分也假如遇每日星行宿次全分不及以日差加減初行分減之者於內加其本宿之前一宿黃道宿次之本度全分減之余以其所加之黃道宿次為次日之宿次度分也假令如遇亢宿不及減者加入角宿十二度八十七分減之余有角宿為次日之宿次度分也他倣此推又如遇前後二叚推得宿次皆是角宿者其前叚度分少如後叚度分者為順每日將日差加減之初行分亦如一次其前叚度分少多如後叚度分者為逆每將日差加減之初行分亦減一次也假令遇其叚有在何月日并日差及初末二行分卻無宿次度分者皆當借其前叚下宿次度分而用之如木星火星晨退夕遲初土星晨退夕遲金星夕退晨遲初水星夕退伏晨遲皆借其前諸留叚下宿次度分也其順逆加減而為逐日星行宿次度分等法依前
