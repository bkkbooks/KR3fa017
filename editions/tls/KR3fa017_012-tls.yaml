body:
  text: 後分余有為法復乘元減去之或中前分或中後分定數以秒為準元列千位通前第六位為万分得數又以九十位六為法而一得為時差分也定數如万分位蒲法得千分不蒲法得百分也秒為準者指千巳下第六位數也推食甚定分法第陸視其推得時差分也如中前分推得者用以去減其定朔小余全分余有為推得食甚定分也如是中後分推得者內加其定朔小余全分共為推得食甚定分也推距午定分法第七八九置其推得或是中前分或是中後分內皆加入推得時差全分共為推得距午定分也推食甚入盈縮曆定度分法第八置其或盈曆初末或縮曆初末全分內加入其定朔大余及推得食甚定分全分內卻減去經朔大小余全分余有為推得食甚入盈縮曆定度分也如元是盈曆者為盈曆定度分如元曆縮者為縮曆定度分也雖蒲十万亦命為十万分也
