body:
  text: 日行分也依此推之後於細行之時自然合也若不依此法推之後於細行之時前後必不相合故曰不偷又如木星火星土星夕伏金星水星晨伏皆置其前後末日行分內加其本叚之日差數一半共得為其各伏叚下初日行分也就與本叚之平行分相減余有為其本叚之增減差也又如木星火星土星晨退夕退將本叚之平行分退一位卻從前六因之得為其叚之增減差也如其前叚之平行分少如後叚之平行分者減其本叚增減差共為其叚之初日行分也又如遇前叚雖多亦減為初日行分而加為末日行分也其二叚之平行分自相比較不與他叚同列後叚反此又其火星晨退當減為初日行分夕退當加為初日行分方是又如金星夕退伏合退伏將本叚之平行分退一位卻從前三因之得
  hash: sha256:eb2dde82e53682b68e79e8df231cb39ddbf19d34dc2c0157fa1124bd78dff260
