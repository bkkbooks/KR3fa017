body:
  text: 法而推用之也黃道各宿次本度分角十二度八七亢九度五六氐十六度四房五度四八心六度二七尾十七度九五箕九度五九斗二十三度四七牛六度九女十一度一二虛九度七五危十五度九五室十八度三二壁九度三四奎十七度八七婁十二度三六留十五度八一昴十一度八畢十六度五觜初度五參十度二八井三十一度三鬼二度一一柳十三度星六度三一張十七度七九翼二十度九軫十八度七五黃道十二次宮界宿次度分凡在各宮界宿次度分巳下者為有交宮危十二度六四九一入亥奎一度七三六三入戌胃三度七四五六入酉畢六度八八五入申井八度三四九四入味柳三度八六八入午張十五度二六六入巳軫十度七九七入辰氐一度一四五二入卯尾三度一一五入寅斗三度七六八五入丑女二度六三八入子推五星逆順交宮時刻法第二十四視五星各叚推得逐日星行宿次度分而與黃道十二次宮界宿次名同度分僅及相減者其日為有交宮也如其宿次名雖相同而其度分
