  text: 四餘通軓欽天監正元按經編輯距大明洪武十七年歲次甲子為元以推中積分法第一置歲周三百六十五万二千四百二十五分為實以距所求積年減一為法末位抵實首乘之為推得中積分也推冬至分法第二十一置其推得中積全分內加入氣準五十五万千三百七十五分共得如滿紀法六十万累去之余
