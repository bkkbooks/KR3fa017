body:
  text: 趄之患焉尔五星入式程規今用洪武十七年甲子為式倣此推甲子年中積分若干乙丑年中積若干閏余分若干閏余若干天正冬至若干天正冬至若干黄道某宿若干黄道某宿若干五星各各叚目行欸格式推木書木前合分若干前合分若干後合分若干後合分若干盈縮曆若干盈縮曆若干凡推筭者五星者依此式界劃填寫各數名扵本叚之下叚目中積日盈縮曆定積日加時日分定星度夜半定星日率平行分增减差初行分中星度盈縮差在何月日加時定星宿次度率泛差捴差日差末行分合伏木星用十六叚火星用十二叚土星用十四叚金星用二十二叚水星用三十六叚凡星自合伏巳後叚目各各不同當從各星曆成
