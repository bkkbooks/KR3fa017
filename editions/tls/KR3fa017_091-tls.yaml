body:
  text: 置其中積全分内加入氣准五十五万千三百七十五分共得如滿紀法六十万去之余為天正冬至分也如推次年者於其天正冬至分内有無閏月皆加歲余五万二千四百二十五分共為次年之天正冬至分也推各年前十一月天正冬至加時日躔赤道宿次度分法第四置其中積全分内加入周應三百一十三万五千六百二十五分共得如滿周天分鈐内挨及减之數去之余有數又用赤道宿次積度鈐内挨及减之角宿度分去之外余為所推得赤道宿次度分也假令如滿尾宿三百五度一十分七十五秒去之余為箕宿度分為所推得也於其内每减一分五十秒即為次年之赤道宿次也周天分鈐三百六十五度二五七五七百三十度五一五一千百九十五度七七二五一千四百六十一度三一千八百二十六万二八七五二千一百九十一万五四五二千五百五十六萬八二五二千九百二十二萬六三千二百八十七万三一七五三千六百五十二万五七五
