body:
  text: 入縮是縮交入盈也如不遇滿曆中分去之者盈縮各仍其舊推五星各各合伏下並逐叚目下盈縮差分法第十一置其各叚目下或是盈曆分或是縮曆分如滿曆策鈴逐號下挨及減之余有為實以其元減去之號幾何於其各星之策數相同號下損益捷法六位為法是盈用盈是縮用縮以末位抵實首乘之得定數以元列度位通前第七位為度也就將其號也盈縮積度全分是加者全加之是減者全減之而為各叚下盈縮差度分也所得之差惟火星有二十五度巳上者木火土得差仍舊其金星差又倍之水星差用三之用其各星之盈縮曆分如不滿曆策鈴中數減之者乃用各星之策數初號下損益捷法也定數同前曆策鈐号數初空一一十五度二一九六二五二三十度四三八一二五三四十五度六五七六七五四六十度八七六二五五七十六度九五三一二五
