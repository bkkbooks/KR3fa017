body:
  text: 或太多及太少者亦無交宮也假如前假是角宿後假是亢宿者為順行也須者置其宮界宿次度分內減去其推得星行宿次度分也將此減度分以日周一万乘之為實又置其次一日下推得星行數次全分內復減其本位推得星行宿次全分余有為法以除其實得數依其發㰸術加二滿万為時減二滿千為刻遇有五千分者進為一時命刻為初刻也如無此五千分者進入為時命為正刻也定數之訣見後假如前假是亢宿後假是角宿者為逆行也逆者置其推得星行宿次度分內減去其宫界宿次度分也亦將此減余度分以日周一万乘之為實又置其前一日下推得星行宿次全分內復減其本假推得星行宿次全分余有為法以除其實得數依前發㰸而得其時刻也假令原減之十二次宮界宿次是甲子中者今書為退入丑也他倣此書又遇前二假同是角宿者視其度分前少後多者為順行也前多後少為逆行也假令遇順行者如挨及減之星行宿
