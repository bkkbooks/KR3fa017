body:
  text: 中積日分也遇滿歲周三百六十五万二千四百二十五分去之推五星各各合伏巳後逐位假目下中星度分法第八置其各各合伏下中星度全分以其各星之假目下逐位平度分挨而纍加之共得即為逐假之中星度分也遇滿歲周全分亦去之其中積日分與中星度分凡在前後二假合伏之下其數必相同者是也但有一數不同者必差也其假之平度分亦有當減之者如木星火星土星晨退夕退假金星水星夕退夕退伏合退伏晨退假皆當減其假下平度分餘為各假之中星度分也如遇不及減者加入歲周全分減之也亦有元無中星度分及盈縮曆並盈縮差分之假如木星火星晨退夕遲初土星晨退夕遲金星夕退金星晨初遲水星夕退伏晨遲
  hash: sha256:2f6a2b2be69ac51c43768c5fc9a6c37da73b74bb4ca90a4ece2e564d2ab69025
