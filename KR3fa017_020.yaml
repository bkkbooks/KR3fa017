body:
  text: 也若是縮曆中後者正交為減差中交為加差也推日食在正交中交定限度分法第十五視推得日食在正交中限度若是食在正交者置正交度三百五十七度六十四分內加減其南北定差全分與東西定差全分是加者加之是減者減之為推得正交定限度分也若是食在中交者卻置中交度一百八十八度五分內加減其推得南北定差全分為東西定差全分是加者加之是減者減之為推得中交定限度分也推日食入陰陽曆交前交後度分法第十六視其前推得交定度若在推得正交定限度巳下者于內減去推得交定度全分余有為推得陰曆交前度分也若在推得正交定限度巳上者于交定度內減去推得正交定限度全分余有為推得陽曆交後度分也又視其前推得交定度若在推得中交定限度巳下者于內減去推得交定度全分余有為推得陽曆交前度分也若在推得中交定限度巳上者于交定度內減去推得中交定限度全
