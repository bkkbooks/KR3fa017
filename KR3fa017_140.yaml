body:
  text: 室九十四度三五七五壁一百三度六九七五奎一百二十一度五六七五婁一百三十三度九二七五胃一百四十九度七二七五昴一百六十度八一七五畢一百七十七度三一七五觜一百七十七度三六七五參一百八十七度六四七五井二百一十八度六七七五鬼二百二十度七八七五柳二百三十三度七八七五星二百四十度九七五張二百五十七度八八七五翼二百七十七度九七七五軫二百九十六度七二七五角三百九度五九七五亢三百一十九度一五七五氐三百三十五度五五七五房三百四十一度三七五心三百四十七度三七五尾三百六十五度二五七五推五星各各合伏下并逐位叚目下日率法第十七置其各各後叚加時日分內減其本叚加時日分余有為日率也如後叚少如本叚不及減者加入六十日減之也又將後叚定積日內減其本叚定積日相較同者是如遇後叚定積日少如本叚定積日不及減者加入三八六十五万減之也間或有差一日者用加時日分相減之也或有差六十日者用定積日相減
