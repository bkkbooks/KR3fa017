body:
  text: 黃道同名亢宿本度九度二十九分然後減之余有為法以除其實得數依其發㰸術推得時刻也假令遇逆行者反此推之也凡或遇留假末位與十二次宮界宿次挨及相減為有交宮矣而卻無次位數減有交宮日為法者卻無交宮時刻也推五星交宮時刻定數捴訣今不用日周一万果而直取其交宮時刻也以万除滿法得不滿法得萬万千千千百百百十十十單以千除滿法得不滿法得千万千百千百十百十以百除滿法得不滿法得百万千十千百
