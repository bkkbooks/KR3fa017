body:
  text: 在一十四日一五一六巳下日月皆食陰食入交在一日二十五刻巳下日月皆不食在二十六日二刻巳上日月皆食在一十二日四十二刻巳上月食在一十四日七十五刻巳下日月皆食在一日一八七二巳下巳下食巳上不食在二十六日二四九巳上日月皆食在一十二日四一八九巳上巳上食巳下不食在一十四七九三三巳下又在交朢一十四日七六五二九六五巳下日月皆食巳上不食又在交終二十七日二一二二二四巳下日月皆食巳上不食又在交中一十三日六六一一二巳下日月皆食巳上不食右各日月食限如日食視其定朔小余分在晝刻者如月食視在定望小余在晝者即同不食亦不必推筭也又與各交沂大余同者食不同者不食其巳下巳上皆指各小余數而言也凡數自萬巳上為大余自千巳下為小余也凡日食視其定朔小余在一千二四九巳下八千八四九巳上皆食在夜刻也起亥初初刻止丑正四刻
