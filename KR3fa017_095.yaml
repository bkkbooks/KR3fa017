body:
  text: 進位得千万以其元减位下赤道度率一度八二三為法除之定數以度除千万滿法的十分不滿法得單分也今滿法得十分也內又加基本位上至後黃道積度七度共得如滿黃道宿次積度鈴內箕宿九度五十九分等數去之余為推得天正冬至加時黃道宿次度分也如遇不滿箕宿九度五十九分者就命為箕宿度分為今推得也黃赤道立成此立成共九十一度為止用此一十度足矣故不及乎他也積度至後黃道分後赤道黃道度率積度至後黃道分後赤道赤道度率初度一度一度八六五一度八六五一度一度一度八六五一度八六三二度一度一度一七二八一度八六三度一度三度二五八八一度八五七四度一度四度三四四五一度八四九五度一度五度四二九四一度八四三六度一度六度五一三七一度八三三七度一度七度五九七一度八二三八度一度八度六七九三一度八一二
