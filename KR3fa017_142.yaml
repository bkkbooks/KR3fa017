body:
  text: 之也又必須用二叚相距加時日所得日辰某甲子為證其日率方是也假令如本叚是甲子後叚是丙子者其日率必得十二日也又如遇本叚是初日者無數去減只後叚日數為其日率也又遇本叚與後叚日辰甲子相同者其日率必是六十日也唯火星日率有六十余日又或有七十日巳上者至九十六七日者當以二叚之中月甲子為照也凡五星諸留叚自日率巳下諸數皆無推五星各各合伏下開逐位叚目下度率法第十八置其各後叚夜半定星度全分內減其本叚夜半定星度全分余有為本叚度率分也如遇後叚少如本叚不及減者加入周天三百六十五万二千五百七十五分減之也又如遇元無夜半定星度全分之叚者借其前叚加時定星度全分減之也文有遇後叚少如前叚不及減當視所得宿次順者加周天全分減之是也如是宿次逆者得叚是角宿前叚是亢宿者當以前叚內反減去後叚而為
