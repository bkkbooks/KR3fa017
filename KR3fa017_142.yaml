body:
  text: 之也又必須用二假相距加時日所得日辰某甲子為證其日率方是也假令如本假是甲子後假是丙子者其日率必得十二日也又如遇本假是初日者無數去減只後假日數為其日率也又遇本假與後假日辰甲子相同者其日率必是六十日也唯火星日率有六十余日又或有七十日巳上者至九十六七日者當以二假之中月甲子為照也凡五星諸留假自日率巳下諸數皆無推五星各各合伏下開逐位假目下度率法第十八置其各後假夜半定星度全分內減其本假夜半定星度全分余有為本假度率分也如遇後假少如本假不及減者加入周天三百六十五万二千五百七十五分減之也又如遇元無夜半定星度全分之假者借其前假加時定星度全分減之也文有遇後假少如前假不及減當視所得宿次順者加周天全分減之是也如是宿次逆者得假是角宿前假是亢宿者當以前假內反減去後假而為
