body:
  text: 度為法而一定數蒲法得度不蒲法得十分也得數用以去減四度四十六分余有為推得南北沂差度分也推南北定差度分法即南北加減差也第十二置其推得南北沂差全分以推得距午定分為法乘之定數以衛為準元列万位前通第八位為千度也得數又以其半晝分為法而一半晝分如千分為千度用也蒲法得度不蒲法得十分也得數用以去減推得南北沂差全分余有為推得南北定差度分也若遇推得南北沂差度分數少不及減者反減之余有亦為推得定差度分也若其應加者卻減之應減者卻加之也又當視其盈縮曆及推得正交中交限度若是盈初縮末者食在正交為減差食在中交為加差也若是縮初盈末者食在正交為加差食在中交為減差也推東西沂差度分法第十三視其推得食甚入盈縮曆行定度分如在周天象限九十一度三一四三七五巳下者為初限也復用其初限去減半歲周一百八十二度六二一二
