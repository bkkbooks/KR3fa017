body:
  text: 用數目録紀法六十萬用日為六十日用度為六十度周天三百六十五万二千五百七十五分歲周三百六十五万二千四百二十五分歲余五万二千四百二十五分通閏一十万八千七百五十三分八十四秒閏准一十八万二千百七十分一十八秒氣准五十五万三百七十五分朔策二十九万五千三百五分九十三秒周應三百一十三万五千六百二十五分曆中一百八十二度六十二分八十七秒半几諸數加减皆止秒衛住巳下不加减欽天監正按經編輯距大明洪武十七年歲次甲子為大統曆元凡算五星不曉經㫖失認真訣擬是而非猶豫末决往徒費功日又兼斘八九是以不愧荒鄙採諸正經附以已意輯為通軌俾紉學之士遵而行之亦得以掉臂長往而無趑
