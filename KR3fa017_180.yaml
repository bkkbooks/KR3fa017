body:
  text: 之初日行分也定數又法推初末日行分法視其本假平行分比後假之平行分多者加為初減末若比後平行分少者減為初加為末凡加減者皆是增減差也又法前多後少加為初減為末也求二十四氣直宿後至元戌子至洪武甲子九七年置宿章余一万二千四百二十五分以戌子年為元積數乘之得數內加宿盈差六万一千六百八十七分共得滿宿會二十八万去之不滿命角宿
