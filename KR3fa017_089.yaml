body:
  text: 而録之今備載于後木星土星每一年用一箇合伏完金星火星每二年用一箇合伏完水星每一年用三箇合伏完凡諸大小數自中積日至度率皆止于秒然有中星度及盈縮曆間或有余五十徽者當存之又自平行分巳下皆止於單徽余者棄之不用推各年前十一月中積分法第一置歲周三百六十五万二千四百二十五分為實距所推積年減一為法又以末位抵實首乘之得為中積分也如推次年者於其中積全分內加入歲周全分共得為次年之中積分也數全妝推各年前十一月閏余分法第二置其中積全分內加入閏準一十八万二千七十分一十八秒共得如滿朔策二十九万五千三百五分九十三秒纍去之至不滿朔策全分者為閏余分也如推次年者於其閏余分閏分一十分八千七百五十三分八十四秒遇滿朔策全分去之余為各次年之閏余分也推各年前十一月天正冬至分法第三
