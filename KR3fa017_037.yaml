body:
  text: 推交前交後度分法第十一視其推得或是入陽曆或是入陰曆如在後準一十五度半巳下者便為交後度也如在前準度一百八十一度八九六七余有為推得交前度一百六十六度三九六八巳上者用以去減交中也陰陽曆即止交定度而言也推月食分秒法第十二置月食限一十三度五分內減去推得或是交前度或是交後度全分余為實以其定法八十七度為法除之得數為月食分秒也定數以十度除十度滿法得度不滿法為十分也又視如推得交前交後度分多如月食限一十三度五分不及減者必不食也又視推得月食分秒如在十分巳下者只用三限辰刻法推之如在十分巳上者用既內分既外分五限辰刻法推之也推月食定用分法第十三置月食分三十分內減去其推得月食分秒余有為實卻用其月食分秒為法乘之定數以衛為準元列分位前通第七位為百分也得數
  hash: sha256:8d563e97db358f252e2fc9e91400d76152840312a5e10e67174bab4549c644e8
