body:
  text: 年黄道宿次度分加之也推五星各各合伏下并逐位叚目夜下半定星度分及宿次度分法第十六置其各叚下加時日分自千巳下小數為實以其各星叚目立成本叚下初行率為法乘之得定数以元例千位通前第四位總分将千巳下数作十分点数又用百约之以秒為定數之准以末位抵實首乘之得數用以去減其本叚加時定星度全分余有為夜半定星度分也遇木火土三星夕退金星夕退伏合退伏晨退水星合退伏皆加之也余叚皆減之也如元無初行率之叚不乘亦無數也將推得各夜半定星度分如满其黄道各宿次積度鈐數去之余有為所推宿次度分也假令满其箕宿九度五十九分去之余有若干即為斗宿度分也其五星凡諸留叚皆無夜半定星度分乃借其各加時定星度分减之而命其宿次也黄道各宿次积度钤箕九度五九斗三十三度六牛三十九度九六女五十一度八虚六十度八七五危七十六度三七五
