body:
  text: 上視其宿之第一格零分下𠰥干日及分加之次復以其度率累加之也假令順行入箕宿者起初度一度二度横排至九度也假令逆行入尾宿者起十七度十六度十五度横排至初度也推四余入初末度積日在何月日已来日數法第七置其推得周後策全分内加入推得閏余全分共得用其月數鈐内挨及减之就視其元减之号數是一号下者其月數得一為十二月也其减余之𠰥干日及分就為推得入月已来日數也又就視其大余𠰥干日得知是某月中某日也其某月某日甲子日辰當以大統曆日定朔爲准用也𠰥其年有閏月者不筭外命為月也只至交得次年冬至日後卻以筭外命為月也命月數鈐
  hash: sha256:818b5ddcbd9c5cbd70258cc050757e6a52e81617b761cfa7705752f56ce40689
