body:
  text: 上視其宿之第一格零分下𠰥干日及分加之次復以其度率纍加之也假令順行入箕宿者起初度一度二度橫排至九度也假令逆行入尾宿者起十七度十六度十五度橫排至初度也推四余入初末度積日在何月日已來日數法第七置其推得周後策全分內加入推得閏余全分共得用其月數鈐內挨及減之就視其元減之號數是一號下者其月數得一為十二月也其減余之𠰥干日及分就為推得入月已來日數也又就視其大余𠰥干日得知是某月中某日也其某月某日甲子日辰當以大統曆日定朔為準用也𠰥其年有閏月者不算外命為月也只至交得次年冬至日後卻以算外命為月也命月數鈐
  hash: sha256:28a721fbf4e707af125f93949b2828255b3aa055c794cdbdd7c7a5e0ec148e99
