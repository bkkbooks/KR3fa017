body:
  text: 分余有為陰曆交後度分秒也推日食分秒法第十七視其推得或是陰曆交前度或是陰曆交後度皆用以去減陰食限八度余有為實以其定法八十分為法而一得為推得日食分秒也或是陽曆交前度或是陽曆交後度皆用以去減陽食限六度余有為實以其定法六十分為法而一得為推得日食分秒也如遇不及減者皆為不食也交數皆以十分除十分蒲去法得單分不蒲法得十秒也余以例推之推日食定用分法第十八用推得日食分秒與日食分二十分相減余有為實卻以日食分秒為法乘之定數以衛為準元列十分位前通第五位復為十分也得為開方積也立天元一于單衛之下依平方法開之得為開方數録于日食分秒之次又用五千七百四十為法乘開方數定數以末位四十為準元列分位前通第四位為万分得數以其前定限行度為法而一定數以度除万
  hash: sha256:d20f7a33b0f7b3d83e3969d1423faaee7bab910961e06304158f5f0776632df8
