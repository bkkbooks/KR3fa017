body:
  text: 之余有為其各遲叚之末日行分也就與本叚之平行分相減余有為其本叚之增減差也又如木星火星晨遲末土星晨遲金星夕遲末水星夕遲皆置前叚下末日行分倍其叚日差分減之余有為其各遲本叚初日行分也就與本叚之平行分相減余有為本叚之增減差也又如金星夕遲末晨遲初此二叚依通軌法推之如遇減差分多如本叚之平行分者名曰不偷如其日率是十六日者置其本叚之平行分為實以八八二三五二為法末位抵其實首乘之得為其叚之增減差也如其日率是十五日者置其本叚之平行分為首以八七四九六為法末位抵其實首乘之得為其叚之增減差也定數元列分位前通第七位為十分也其夕遲末者於其平行分內加入其增減差共為初日行分而減其增減差余為末日行分也其晨遲初者於其平行分內減其增減差余為初日行分而加入增減差共為末
