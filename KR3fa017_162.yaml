body:
  text: 某月大小木火土金水一日二日三日四日推五星各各假目逐日細行法二十三當視其年大統曆日推得各月之定朔日辰某甲子而録於各月一日下依其月之大小而界之又視其五星推得各各假目某假各并其某宿次全分依此其推得在何月日而録於各同月同日之下假令木星之合伏假下推得在何月日是正月初五日其推得夜半定星宿次是角宿一度二三四五者於木星格中正月初五日下書合伏角宿一度二三四五也其余星之各各在何月日并假目宿次度分皆倣此而書之也然后置其各假日下所書宿次全分以其本假下之初日行分全數先直順加逆減於其宿次全分內共為其第二日下推
  hash: sha256:4ed59c9ed0f72faa0b62b3a882d01c5af20c15e2d13794b03eac84670de0da18
