body:
  text: 欽天監正元統按經編輯詳夫交食之術曆經所載二法混而為一實難辨別憶初學者識數未精無憑推筭今分而為二各一其法始終明備𠇺初學者易知而無所用其心也錄各有食月之朔日下等數凡諸小余皆止乎衛唯交常度全收經朔全分盈縮曆全分盈縮差全分遲疾曆全分限數遲疾差全分加減差全分定朔全分交沂全分定入遲疾曆全分各遲疾曆全分內以其加減差是加者加而減者減之得為定入遲疾曆分也定限定入遲疾曆分內又依法加二二得為定限也定限行度視同定限下遲疾行度是遲用遲是疾用疾全分內減去日行八分二十秒余有為所得定限行度也半晝分視所得或元盈曆初末或元縮曆初末火余若干日下半晝分全錄之是也遇有帶食分者亦用其日日出分及日入分也歲前冬至加時黃道宿次度分
  hash: sha256:bfd9bcacf94316f2a0809a2dc8640ed399efd6f14a4c9733fdf9d4902286e2d7
