body:
  text: 推食卽更點法第二十七視其推得食卽全分如在其日晨分巳下者內加入晨分共為推得食卽更分也如在其日昏分巳上者內減去其昏分余有為推得食卽更分也推更點法同前推食甚更點法第二十八視其推得食甚全分如在其日晨分巳下者內加入晨分共為推得食甚更分也如在其日昏分巳上者內減去其昏分余有為推得食甚更分也推更點法同前推生光更點法第二十九日視其推得生光全分如在其日晨分巳下者內加入其晨分共為推得生光更分如在其日昏分巳上者內減去昏分余有為推得生光更分也推更點法同前後推復圓更點法第三十六視其推得復圓全分如在其日晨分巳下者內加入其晨分共為推得後圓更分也如其日昏分巳上者內減去其昏分余有為推得復圓更分也推更點法同前
