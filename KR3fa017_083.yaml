body:
  text: 捋小餘分依法斂術推得時刻也又當視推得宿次輿黃道十二次交宫宿次各不同者則無交宫時刻也假令如紫孛推得所入黃道宿次遇有氐宿者即置其氐宿一度下入宫定積全分依上推得某甲子日辰某時刻交入卯宫也如羅計遇氐宿者却置其前宫軫宿入度下入宫定積全分依前推得某甲子日辰某時刻退入辰宫也四餘躔度軌終
