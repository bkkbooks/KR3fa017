body:
  text: 次是十五日者置其十六日下星行宿次全分內減去其十五日下星行宿次全分余為法也假令遇逆行者如挨及減之之次十二次宮界宿次是十五日者置其十四日下星行宿次全分內減去其十五日下星行宿次全分余為法也假令如遇順行假前一日下星行宿次是亢宿者十二次宮界宿次止有氐宿而無亢宿故曰未有謂其未有交宮也行至次日已滿其亢宿九度五十六分減去而交入氐宿而與十二次宮界之氐宿名同為有交宮矣然其度分卻多如十二次宮界之氐宿一度十四分五十二秒者為之已過㐺此只合於前一日下亢宿全分中取之交宮時刻方是也其法當置十二次宮界之氐宿一度十四分五十二秒內加入元減去亢宿九度五十六分共得度分內卻減去其前一日下未有交宮星行宿次亢宿全分余有以日周一万乘之為實又置其次一日下星行宿次交入氐宿全分內減去其前一日下未有交宮之亢宿全分余有為法如遇不及減者其未有交宮之
