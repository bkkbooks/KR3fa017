body:
  text: 推食甚入盈縮差度分法第九得數以百万為百分也置其推得食甚入盈縮曆定度全分去其大余如盈初縮末者用冬至後如是縮初盈末者用夏至後以元去大余日下加分為法乘之定數法以秒為準元列千位前通第八位為度以万為度得數又就加其下盈縮積全分共為推得食甚入盈縮差度也如遇末曆皆用反減半歲周之數推食甚入盈縮曆行定度分法第十置其推得食甚入或盈曆定度或縮曆定度全分以万為度內盈加縮減其推得食甚入盈縮差全分為推得食甚入盈縮曆行定度分也推南北沂差度分法第十一視其推得食甚入盈縮曆行定度全分如在周天象限九十一度三一四三七五巳下者為初限分也如在巳上者用以去減半歲周一百八十二度六二一二五余為末限也或得初限自相乘之或得末限亦自相乘之定數以衛為準元列万位前通第十位為千度也後以一千八百七十
