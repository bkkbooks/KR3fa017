body:
  text: 各借其本假之前後二假夜半定星度分或加時定星度分視其宿次逆順互相減之余有為其本假之度率也其度率欲效真者置其與前假所得同名黃道宿次全分內減去其所得宿次全分者余內挨加中間所欠黃道各本宿次全分至後假所得宿前而止卻又加入後假所得宿次全分共為其度率也如遇推得度率同者是也如不同者其度率必差也假令如前假所得是角宿後假所得是房宿置其黃道角宿全分一十二度八十七分於內減去所得角宿度分若干余內加入亢宿全分九度五十六分氐宿全分一十六度四十分及加後所得房宿度若干共為其假之度率也又於如後假是角宿前假是房宿者亦從後假角加至前假房而為其度率也又有前後二假皆同一宿次者置其多者內減去少者余有為其度率也推者詳之庶不差用其度率也推五星各各合伏下并逐位假目下平行分法第十九置其各假度率全分為實以其各本假日率為
