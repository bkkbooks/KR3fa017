body:
  text: 行分比次叚之平行分多者內加入其本叚之增減差共得為其初日行分也復置其平行分內卻減去其本叚增減差余有為其末日行分也前多後少者加為初減為末前少後多者減為初加為末推五星各各叚下元無泛差之增減為末前少捴差日差及初日行分與末日行分法第二十二置其各各合伏之次叚下初日行分內加其本叚之日差數一半共得為其各各合伏叚下末日行分也就與合伏叚之平行分相減余有為本叚之增減差也就倍其增減差而為其捴差也復以本叚上日率減去一日為法除此捴差得數而為本叚日差也其取初日行分法依前第二十一推之也後同此推之又後凡言因者言十身前置凡言拆半者言十本身留者是後凡推捴差日差法此捷法又如木星火星夕遲初土星夕遲金星晨遲初水星晨遲皆置其後叚下初日行分倍其叚日差分減
