body:
  text: 又拆半而為其本叚之增減差也其二叚之平行分亦自相比較如前叚少者減為初日行分而加為末日行分也如後叚多者加為初日行分而減為末日行分也其夕退則以後叚之初日行分內減其本叚日差全分余有為其本叚之末日行分也就與本叚平行分相減余有為其本叚之增減差也其晨退則以前叚之末日行分內減其本叚日差全分余有為其本叚初日行分也就与本叚平行分相減余有為其本叚之增減差也又如水星夕退伏合退伏皆拆半其本叚之平行分而為其本叚之增減差也如其前叚之平行分少如後叚之平行分者減本叚之增減差余有為初日行分而加本叚增減差共為末日行分也其後叚卻加本叚增減差共為初日行分而減為末日行分也凡推五星各各叚目逐日細行格式
