body:
  text: 又拆半而為其本假之增減差也其二假之平行分亦自相比較如前假少者減為初日行分而加為末日行分也如後假多者加為初日行分而減為末日行分也其夕退則以後假之初日行分內減其本假日差全分余有為其本假之末日行分也就與本假平行分相減余有為其本假之增減差也其晨退則以前假之末日行分內減其本假日差全分余有為其本假初日行分也就與本假平行分相減余有為其本假之增減差也又如水星夕退伏合退伏皆拆半其本假之平行分而為其本假之增減差也如其前假之平行分少如後假之平行分者減本假之增減差余有為初日行分而加本假增減差共為末日行分也其後假卻加本假增減差共為初日行分而減為末日行分也凡推五星各各假目逐日細行格式
