body:
  text: 日行分也依此推之後於細行之時自然合也若不依此法推之後於細行之時前後必不相合故曰不偷又如木星火星土星夕伏金星水星晨伏皆置其前後末日行分內加其本假之日差數一半共得為其各伏假下初日行分也就與本假之平行分相減余有為其本假之增減差也又如木星火星土星晨退夕退將本假之平行分退一位卻從前六因之得為其假之增減差也如其前假之平行分少如後假之平行分者減其本假增減差共為其假之初日行分也又如遇前假雖多亦減為初日行分而加為末日行分也其二假之平行分自相比較不與他假同列後假反此又其火星晨退當減為初日行分夕退當加為初日行分方是又如金星夕退伏合退伏將本假之平行分退一位卻從前三因之得
