body:
  text: 又為實數止衛立天元一于單衛之下開之得單秒也依平方法開之得為開方數如滿百分者開之得十分也録于月食分秒之次又用四千九百二十為法乘之開方數定數以二十分為準元列分位前通第四位為万分也得數為實以其定限行度為法而一得為推得定用分也定數以度除万分滿法得百分不滿法為十分也若以十分除万分滿法得千分不滿法亦得百分也三限辰刻法凡時刻千位加二之後得時進位為十時百位為刻如遇無數為初刻也其三限更法點法見于五限更點法中推初虧分法第十四置其推得食甚定分全分內減去其推得定用分全分余有為初虧分也依發㰸術推之得其時刻也次二限依此推之推食甚分法第十五即將前推得食甚定分全分就便為推得食甚分也推時同前推復圓分法第十六
