body:
  text: 法也定數如千數滿法復得千分不滿法為百分也將推得更法全分又用五百分為法而一得為點法也定數如百數滿法復得百分不滿法為十分也推其日昏分法第二十五視其推得食甚入盈縮曆或元盈初縮末或元縮初末大余若干日下昏分全分錄為推得其日昏分也依發㰸術推得其時刻也推初虧更點分法第二十六視推得初虧分如在其日晨分巳下者內加入晨分共為推得初虧更分也如在其日昏分巳上者內減去其日昏分余有為推得初虧更分也將此更分內減去元推得更法如是滿減一次為一更也若不滿其元推得更法分者命為初更也將元減余及不滿更法數卻以元推得點法分為法而一得為其點也如不滿元推得點法分者命為初點也命起初更初點筭外得初更虧之更點也次四限更點皆以此而推之各得其各限之更點也其日指元盈縮初末大余相同若干日也後同
