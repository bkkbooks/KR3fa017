body:
  text: 推月食所起方位法第三十一視其推得入隂陽曆如是食在陽曆者初起東北食甚正北復圓西北也如是食在隂曆者初起東南食甚正南後圓西南也又視推得月食分秒如是食在八分巳上者無問食在陽曆隂曆皆初起正東復于正西此據午地而論之也之推月食離黃道宿次法第三十二置其推得食甚入盈縮曆行定度全分如是盈曆者內加入半周天一百八十二度六二八七五共為定積也又加入其年歲前冬至加時黃道宿次度分共得以其黃道各宿次積度鈐中挨及減之宿次減之余有為為減去之次宿度分為推得月離黃道宿次度分也如是縮曆者內加入半周天同豐歲周共數三百六十五度二十五分共得數滿周天三百六十五度二五七五去之余為定積度分也或就行定度內減去七十五秒余為定積亦同也內卻加入其年歲前冬至加時黃道宿次度分共得以其黃道各宿次積度鈐內挨及減之宿次減之余有為減去之次宿
