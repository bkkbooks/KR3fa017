body:
  text: 各星周率全分纍去之余不滿各星之周率全分者即為各星之前合分也就用其前合全分減去周率全分只一次余有即為各星之後合分也雖滿歲周全分皆不必去之若將其後合分命為中積日分及中星度分也遇滿歲周三百六十五万二千四百二十五分去之余有為中積日分及中星度分也其中積滿万命為其中星滿万命為度實一數而命為二名也學者勿疑假令金火二星如甲子年推得其年後合分此後合即
