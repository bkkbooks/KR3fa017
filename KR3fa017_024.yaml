body:
  text: 分蒲法得百分不法為十分也得數為推得定用分也推初虧分法第十九置其推得食甚定分內減去推得定用分余有為推得初虧分也依發㰸術推之得為時刻也千位為時而百位為刻也推食甚分法第二十即前推得食甚定分也亦依發㰸術推之得時刻也推復圓分法第二十一置其推得食甚定分內加入推得定用分共為推得復圓分也時刻同前推日食所起方位法第二十二視其推得日食入陰陽曆交前後度若是陽曆者初起西南甚于正北復于東南也若是食在陰曆者初起西北甚于正北復于東北也若食八分巳上者或是陰曆或是陽曆皆初起正西復于正東也此據午地而論之推日食有帶食分秒法第二十三視其元盈縮曆大余相同之日下日出分日入分
  hash: sha256:3c21788fb4109feba55d5034b1c345839fc3787cde9d50af1f8b9d706cdd59bc
