body:
  text: 又如至後策去挨僅及减之初末積日全分如是紫孛所减之宿是尾者得箕也如是羅睺計都所减之宿是心者得房也推四余入各宿次初末度積日及分法第六置其推得周後策全分內加入其冬至全分共得遇滿紀法六十万纍去之余有為推得入各宿之初末度積日及分也如是紫氣與月孛者順行入各宿之初度也元挨及减之宿是尾者余有為入箕宿初度積日及分也如是羅睺與計都者逆行入角宿之末度也元挨及减之宿是心者余有為入房宿末度積日及分也就其各大余命甲子算外得其日辰也就將各余氣之度率全分纍加之得為各宿逐度下初末積日及分也如紫孛得各宿之初度者加其宿末度位上視其宿之第二格零分下𠰥干日及分加之方交入次宿初度分秒也如羅計得各宿之末度者先加其宿之一格零分下𠰥干日及分為次度下分秒也然後方用各度率纍加之得為各宿逐度下初末度積日及分也加至方交入次宿末度位
