body:
  text: 當用本年前閏余全分加之也每遇减歲周全分一次其閏余分亦交换一次用之也又如其年遇有閏月者自閏月巳後各退一月而用之假令元减之數是八十八万者乃是二月也今退為正月也他倣此推直至其定積日分復滿歲周全分减去後却當依其元减之策數命其月日也推者詳之朔策鈐前十一月二十九万巳下者前十二月二十九万正月五十九万二月八十八万三月一百一十八万四月一百四十七万五月一百七十七万六月二百六万七月二百三十六万八月二百六十五万九月二百九十五万十月三百二十四万十一月三百五十四万十二月二十九万正月五十九万推五星各各合伏下并逐位假目下定星度分及加時定星度分法第十五置其各假中星度全分以其本假下如是盈差者則加之共得為定星度分也如是縮差者則减其
  hash: sha256:0f9e84bff2b595776681de8239ac7f1a2f2998125bd6e54ac8a62942dbccb30d
