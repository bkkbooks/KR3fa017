body:
  text: 分加之方是也直遇滿歲周全分減之後却當用其本年前天正冬至分加之也每遇減歲周全分一次其天正冬至分亦交换一次用之也推五星各各合伏下并逐位假目下在何月日法第十四其在何月日乃是指其同年推得定朔甲子也置其各假定積日分以其各年前閏余全分加之共得數如不滿朔策鈐二十九万巳下者為本年前十一月也若滿二十几万巳上者去之為本年前十二月也余皆以僅及減之策數減之以其元減之月定其日辰之其甲子也凡減余一万者為一日也十日者為十日也各以其月定朔甲子挨推其在何旬何日也其減余之數有相同者有與加時日辰甲子差一二日者皆勿疑也又若定積日分魯加歲周分者及推各年合伏魯周上年中積分者皆當用上年閏余全分加之是也但遇滿歲周全分減之後却
