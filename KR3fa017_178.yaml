body:
  text: 次度分也假令如滿名宿次挨而去之者如前叚是角宿後叚是房宿者於內減去角十二度八十七分亢九度五十六分氐十六度四十分余有即得合後叚之房宿度分也日率乘其初行分定數如十日乘一度進百得百度不進位得十度也如十日來十分進位得十度不進位得單度也余以例推日率乘其日差法及定數以其叚之日率張二位以一位為寶一位減一日余為法以乘其實得定數以十日乘十日乘十日進位得千度不進位得百度就拆豐而為法以乘其叚之日差全分得定數如百度乘十分進位得百度不進位得十分也如百度乘單分者進位得十度不進位的單度也較各叚之初行分者置其叚之日差止纎以其叚日率張二位以一位為實一位減一日為法乘之得拆半復為法乘其日差分得數加入次叚推得宿次全分及中間滿黃道宿宿次度分減去之數內卻減其叚為得宿次全分余有以其日徐之得其叚
