body:
  text: 法除之得為其平行分也定數以十日除一度滿法得十分不滿法得單分也木星火星土星平行分並無得一度者止得十分巳下數也惟金星水星平行分有得二度者及十分以下者録數至止衛推五星各各合伏下并逐位假目下有無泛差及增減差捴差日差等法第二十置其本假之前後二假平行分或前多後少或後多前少皆以多內減少余有為本假之泛差也就將此泛差全分退一位卻倍之以為本假下之增減差也倍其增減差而為捴差分也就為實以其本假上日率內減一日余為法以除其捴差全分得數為共日差分也定數以十日除捴差之單分如滿法得十秒不滿法得單秒也雖增減差自衛巳下數不用亦不可便葉營全存之可還元也言退一位者本是十分令退為單分用之也數全妝本假前後二假平行分者
