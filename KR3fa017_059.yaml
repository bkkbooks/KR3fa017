body:
  text: 不滿紀法者為推得歲前十一月冬至分也推閏余分法第三置其推得中積全分內加入閏準一十八万二千百七十分一十八秒共得如滿朔策二十九万五千三百五分九十三秒纍去之余不滿朔策二十九万五千三百五分九十三秒者為推得閏余分也推四餘至後策法策第四五置其推得中積全分內加入各各餘氣立成內至後策全分共得就用其各餘氣周積全分減之余不滿各周積全分者為推得至後策也推四餘周後策法第五將推得各餘至後策全分用以去挨至僅及減之各餘立成內第四格初末度積日全分余有為推得各餘周後策也又亦視上年躔於何宿次而挨減之也假令如遇推得各各至後策余一日者用以去減各宿次度之零分下日及分余有為推得周後策也
