body:
  text: 凡推交宮時刻除得千百位數而止余數雖皆是九亦無用也較其五星細行前假宿次度分合其後假宿次度分之法第二十五假如順行假者置其假推得初日行分全數以其本位上日率為法乘之得數加入其假推得某宿次全分共得又視其初日行分多如末日行分者內減其日率乘其日差之數如初行分少如末行分者內加其日率乘其日差之數即合次假推得宿次度分也遇黃道同名宿次度分挨而減去之余不滿者即為次假之宿次度分也假如逆行假者置其假推得初日行分全數以其假上日率為法乘之得數以減其假之推得某宿次全分如其宿次度分少而不及減者挨加其本宿同名前之黃道宿次全分至及減之而止然後減之也余有數又視其初行分多如末行分者內加其日率乘其日差之數其初行分少如末行分者內減日率乘其日差之數余有次假推得宿
