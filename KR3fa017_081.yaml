body:
  text: 推四餘入各宿次逐度積日及分法視其推得各餘交入某黃道宿次初末度𠰥干橫排於各氣格式第一格中假令紫氣月孛如推得是箕宿者書箕初度𠰥干日及分次一度次二度順排至九度也假令羅睺計都如推得是尾宿者書尾十七度若干日及分次十六度十五度逆排至初度也然後依元推得初末度𠰥干日及分上以各度率纍加之即得入逐度積日及分也加至各宿之初末度相接處逆順背以其宿零分下若干日及分之方交入次宿度分也自然與其初末之度分相合也推各餘交十二宫次在何月何日辰某時刻法第九視其各餘氣推得黃道宿次與有交宫十二次宫界宿名同度下入宫之積全分內減去其推得至後䇿余有為入其某辰宫積日及分也當副置之一內加入推得閏餘全分共得以月數鈐挨及減之號下數減之命為某月也餘得是何月內加一入推得冬至全分共得如滿紀法六十萬去之余有視其大余若干算外命甲子得日辰就
