body:
  text: 五余有為末限也以初末二限相乘得定數以衛為準元列万位前通第十位為千度也復以一千八百七十度為法而一定數蒲法得度不蒲法得十分也為推得東西沂差度分也又云如遇行定度分如在周天象限巳上者為末限用以去減半歲周余為初限也姑備如此推東西定差度分法即東西加減差也第十四置其推得東西沂差全分以推得距午定分為法乘之定數以衛為準元列万位前通第八位為千度也得數為實以日周四分之一分即二千五百分即二千五百度為法而一定數蒲法得度不蒲法為十分也得數為推得東西定差度分也若推得東西定差若在東西沂差巳上者就為東西定差也若在東西沂差巳上者倍其東西沂差以減其定差余有為推得東西定差度分也又視其盈縮曆及推得中前分中後分與正交限度中交限度若是盈曆中前者正交為減差中交為加差也若是盈曆中後者正交為加差中交為減差也若是縮曆中前者正交為加差中交為減差
