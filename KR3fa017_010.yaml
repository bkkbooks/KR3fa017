body:
  text: 右元是盈曆者書盈元是縮曆者書縮其遲疾曆及加減差亦然凡算交食必依此而録之推交常度法第一置其有食之交沂全分為實以月平行一十三度三六八七五為法乘之得數為交常度分也定數以末位五為準元列万前通第六位為度也推交定度第二置其推得交常度全分內盈加縮減其元盈縮差全分而為交定度分也推日食在正交中交限度法第三其推得交定度全分如在七度巳下或三百四十二度巳上者皆為食在正交也如在一百七十五度巳上或二百二度巳下者皆為食在中交也推中前中後度分法第四視其定朔小余分如在半日周五千分巳下者用以去減半日周五千分余有為推得中前分也如在半日周五千分巳上者于內減去半日周五千分余有為推得中後分也推時差分法第五置半日周五千分內減去推得或中前分或中
