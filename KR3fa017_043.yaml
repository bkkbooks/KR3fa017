body:
  text: 分全分余有為初虧分也依發㰸術推之得其時刻也次四限時刻同此推之推食即分法第草置其推得初虧分全分內加入推得即外分全分共為推得食即分推時同前推食甚分法第二十一置其推得食即分全分內加入其推得即內分全分共為推得食甚分也推時同前推生光分法第二十二置其推得食甚分全分內加入其推得即內分全分共為推得生光分也推時同前推復圓分法第二十三置其推得生光分全分內加入其推得即外分全分共得如滿一万分者去之余有為推得復圓分也推時同前推月食入更點法第二十四置其推得食甚入盈縮曆如元是盈曆初末者用冬至後晨分如元是盈曆者初末用夏至後晨分以其大余若干日下晨分全分就倍之得數用五千分為法而一得為更
