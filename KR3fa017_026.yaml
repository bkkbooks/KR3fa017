body:
  text: 如在初虧分巳上食甚分巳下者為有帶食之分秒也若是食在晨刻者與日出分相減若是食在昏刻者與日入分相減也各與推得食甚分與其日之日出分日入分相減余有為帶食分也用以去乘推得日食分秒定數以帶食差之衛為準元列分位前通第七位為百分也得數以其推得定用分位法而一定數以百分除百分蒲法得一分不蒲法為十秒也得數用以去減日食分秒余有為所見帶食之分秒也如遇食在昏刻者亦同此法推之推食甚日躔黃道宿次法第二十四置其推得食甚入盈縮曆行定度全分如是盈曆者就為定積也內加入其歲冬至加時黃道宿次全分共得以黃道各宿次積度鈐內埃及減之宿次數減之余有為減去之次宿度分為推得日躔黃道宿次也如是縮曆者內又加入半歲周一百八十二度六二一二五共為定積也內又加入其歲前冬至加時黃道宿次全分共得亦以黃道各宿次積度鈐內埃及減之宿次減之也金同前命
