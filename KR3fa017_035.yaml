body:
  text: 推食甚入盈縮差度分法第八置其推得食甚入盈縮曆或初末限如遇盈末与縮末者将推得食甚入盈縮全分去减半歲周全分余内却减去大余然視其盈初縮末与縮初盈末以元减去大余日下加分起百至秒五位為法乘之定數以秒為准元列万前通第七位為度也得數又加其下盈縮積分全分共得為所推得食甚入盈縮差度分也滿万為度千為十分也如元是盈曆者為盈差元是縮曆者為縮差仍用三差直指乘之推食甚入盈縮曆行定度分法第九置其推得食甚入盈縮曆全分命万為度内盈加縮减推得食甚入盈縮差全分而為食甚入盈縮曆行定度分也推月食入隂陽曆法第十視其推得交定度如在交中度一百八十一度八九六七巳下者便為陽曆也如在巳上者扵交定度全分内减去交中度一百八十一度八九六七余為隂曆也
  hash: sha256:ee1be8b6c9f4368abe144382dfe89111f00dc3c2e3da25740845a6bfee6f5c76
