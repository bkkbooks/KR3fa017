body:
  text: 推食甚入盈縮差度分法第八置其推得食甚入盈縮曆或初末限如遇盈末與縮末者將推得食甚入盈縮全分去減半歲周全分余內却減去大余然視其盈初縮末與縮初盈末以元減去大余日下加分起百至秒五位為法乘之定數以秒為準元列万前通第七位為度也得數又加其下盈縮積分全分共得為所推得食甚入盈縮差度分也滿万為度千為十分也如元是盈曆者為盈差元是縮曆者為縮差仍用三差直指乘之推食甚入盈縮曆行定度分法第九置其推得食甚入盈縮曆全分命万為度內盈加縮減推得食甚入盈縮差全分而為食甚入盈縮曆行定度分也推月食入隂陽曆法第十視其推得交定度如在交中度一百八十一度八九六七巳下者便為陽曆也如在巳上者于交定度全分內減去交中度一百八十一度八九六七余為隂曆也
  hash: sha256:df0ab8831aa5b2b83dcdf1e8d02cba1978d70b66acfdf97ee37053f812af04ea
