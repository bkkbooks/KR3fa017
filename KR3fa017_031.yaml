body:
  text: 推交常度分法第一置其有食之交沂全分為實以月平行一十三度三六七八五為法乘之得數為交常度分也定數以末位五為準元列万前通第六位為度推交定度法第二置得交常度全分內盈加縮減其元盈縮差全分得而為交定度分也如遇交常度分少如其縮差度分不及減者加交終度三百六十三度七九三四一九然後減之余有為交定度分也推卯酉前後分法第三視其定望小余全分如是千者只作千分如是百者只作百分如在二千五百分巳下者就為卯前分如在二千五百分巳上者用以去減半日周五千分余有為卯後分也又如在七千五百分巳下者于內減去半日周五千分余有為酉前分也如在七千五百分以上者用以去減日周一万分余有為酉後分也假令得卯前分者書卯前分得卯後分者書卯後分余此例推推時差法第四
