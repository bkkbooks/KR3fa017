body:
  text: 得宿次度分也次用其假推得日差全分每一日或當加者加之或當減者之於其初日行分卻將日差加減得初日行分加減於宿次而為逐日下星行之宿次度分也直至次假所書假目宿次度分相合同而止或多或少之數皆書之於次假目宿次度之木星土星金星水星或多或少止有十秒者唯火星有二十秒者其次各各假下皆依其所書宿次全分依前法各再起之也假令視其各假下初日行分多如同假之末日行分者將本假之日差為減也於其初行分內每日減一次如視其假下初行分少如同假之末日行分者將本假之日差為加差也於其初行分內每日加一次即將以日差加減得初行分共復加減其宿次全分而為逐日星行宿次度分也又當視其各假推得宿次假如前假是角後假是亢宿者為順每日將日差加減之初行分加一次如前假是亢宿後假是角宿者為逆每日將日差減之初行分減一次而為其逐日星
